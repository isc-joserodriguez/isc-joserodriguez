name: Update Dynamic Content

on:
  schedule:
    - cron: "0 0 1 1 *" # Every January 1st
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update years of experience
        env:
          START_YEAR: 2018
        run: |
          CURRENT_YEAR=$(date +%Y)
          YEARS=$((CURRENT_YEAR - START_YEAR))

          # Update typing SVG (URL-encoded: NUMBER%2B+years)
          sed -i "s/[0-9]\+%2B+years/${YEARS}%2B+years/g" README.md

          # Update About Me text (NUMBER+ años de experiencia)
          sed -i "s/\*\*[0-9]\++ años de experiencia\*\*/\*\*${YEARS}+ años de experiencia\*\*/g" README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update years of experience" && git push)
